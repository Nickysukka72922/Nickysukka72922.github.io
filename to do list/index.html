
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, inital-scale=1.0">
    <title>To do list</title>
  </head>
  <body id="body">
    <h1>My to do list</h1>
    <div id="task-container">
</div>
<p id="save-status">Last saved: <span id="timestamp">Never</span></p>
<div id="buttons">
    <button class="addtask" onclick="addtask()">Add</button>
    <button class="deletetask" onclick="deleteTask()">Delete</button>
    <button class="deletetask" onclick="clearTask()">Clear</button>
</div>
    <div id="task" class="hidden">
            <input type="checkbox" name="Done" value="yes" class="checkbox-round">
      <input name="task" type="text" class="tasks" placeholder="Enter a task">
    </div>
    <style>.tasks {
  float: left;
  width: 49%;
  margin: 1%;
  border-radius: 25%;
}
.checkbox-round {
  width: 1.7rem;
  height: 1.7rem;
  border-radius: 50%;
  vertical-align: middle;
  border: 0.1rem solid #000;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  cursor: crosshair;
  margin: 1%;
}

.checkbox-round:checked {
  background-color: rgb(255, 0, 0); /* Change background when checked */
}
.hidden {
    display: none;
}
.show {
  display: block;
}
#task-container {
    position: top;
    width: 100%;
}
.addtask {
  border-radius: 25%;
  background-color: rgb(0, 255, 0);
  cursor: context-menu;
}
.deletetask {
  border-radius: 25%;
  background-color: rgb(255, 0, 0);
  cursor: context-menu;
}
#save-status {
  position: left;
  cursor: context-menu;
}
</style>
<script>let cloneCount = 0;

// 1. Initialize on load
window.onload = function() {
    const savedData = localStorage.getItem("myStoredTasks");
    const savedTime = localStorage.getItem("lastSavedTime");
    
    if (savedData) {
        const tasks = JSON.parse(savedData);
        // Using a temporary variable to prevent saveAll loop while loading
        tasks.forEach(task => addtask(task.text, task.checked));
    }
    
    if (savedTime) {
        document.getElementById("timestamp").innerText = savedTime;
    }
};

// 2. The Add Function
function addtask(savedText = "", isChecked = false) {
    const original = document.getElementById("task");
    const clone = original.cloneNode(true);
    
    cloneCount++;
    clone.id = "task-" + cloneCount;

    const textInput = clone.querySelector('input[type="text"]');
    const checkbox = clone.querySelector('input[type="checkbox"]');

    textInput.value = savedText;
    checkbox.checked = isChecked;

    document.getElementById("task-container").appendChild(clone);
    clone.classList.add("show");
    
    saveAll();
}

// 3. The Delete Function (Fixed Reference)
function deleteTask() {
    if (cloneCount > 0) {
        const lastClone = document.getElementById("task-" + cloneCount);
        if (lastClone) {
            lastClone.remove();
            cloneCount--;
            saveAll();
        }
    }
}

// 4. The Clear Function
function clearTask() {
    if (confirm("Delete everything?")) {
        const container = document.getElementById("task-container");
        container.replaceChildren();
        cloneCount = 0;
        saveAll();
    }
}

// 5. The Save Logic
function saveAll() {
    const container = document.getElementById("task-container");
    const allClones = container.querySelectorAll('[id^="task-"]');
    const dataToSave = [];

    allClones.forEach(clone => {
        dataToSave.push({
            text: clone.querySelector('input[type="text"]').value,
            checked: clone.querySelector('input[type="checkbox"]').checked
        });
    });

    localStorage.setItem("myStoredTasks", JSON.stringify(dataToSave));

    const now = new Date();
    const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    
    const timestampElement = document.getElementById("timestamp");
    if (timestampElement) {
        timestampElement.innerText = timeString;
        localStorage.setItem("lastSavedTime", timeString);
    }
}

// 6. Listeners for Auto-Save
document.getElementById("task-container").addEventListener('input', saveAll);
document.getElementById("task-container").addEventListener('change', saveAll);</script>
  <style>
  .floating-back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100; /* Keeps it on top of other elements */
        }

        .floating-back-btn img {
            width: 60px;                  
            height: 60px;
            border-radius: 50%; /* Makes it a circle */          
            border: 3px solid white;      
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
            background-color: white; /* Makes sure the icon is visible */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;              
        }

        /* Hover effect */
        .floating-back-btn img:hover {
            transform: scale(1.1); /* Slight zoom on hover */        
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); 
        }

        /* Mobile responsive shrinking */
        @media (max-width: 480px) {
            .floating-back-btn {
                top: 10px;
                left: 10px;
            }
            .floating-back-btn img {
                width: 45px;
                height: 45px;
            }
        }
  </style>

        <img src="https://nickysukka72922.github.io/back btn.png" alt="Back">
    </a>
  </body>
</html>
