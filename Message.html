<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share your ideas!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        iframe {
            width: 100%;
            height: 100vh; /* Full screen height */
            border: none;
        }
        footer {
        background: #333;              /* Dark background */
        text-align: center;            /* Center content */
        padding: 15px 0;               /* Space around button */
        margin-top: auto;              /* Push footer to bottom */
    }

    /* Image button styling */
    .footer-button img {
        width: 60px;                   /* Button size */
        height: 60px;
        border-radius: 50%;            /* Circle shape */
        border: 3px solid white;       /* White border */
        box-shadow: 0 4px 8px rgba(0,0,0,0.3); /* Soft shadow */
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: pointer;               /* Pointer on hover */
    }

    /* Hover effect */
    .footer-button img:hover {
        transform: scale(1.1);         /* Slight zoom */
        box-shadow: 0 6px 12px rgba(0,0,0,0.4); /* Bigger shadow */
    }

    /* Mobile-friendly adjustments */
    @media (max-width: 480px) {
        .footer-button img {
            width: 50px;
            height: 50px;
        }
    }

    /* Page layout to keep footer at bottom */
    body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: Arial, sans-serif;
    }
    </style>
</head>
