<div class="contact-container">
    <h2>Idea Submission | Nickysukka72922</h2>
    
    <!-- 1. Added an ID attribute to the form -->
    <form id="ideaForm" action="https://formspree.io/f/xqeonrjg" method="POST">
        
        <input type="hidden" name="_subject" value="New Website Project Idea Submission!">
        
        <div class="form-group">
            <label for="name">Your Name / Alias:</label>
            <input type="text" id="name" name="name" required placeholder="Name (or leave anonymous)">
        </div>
        
        <div class="form-group">
            <label for="email">Your Email Address:</label>
            <input type="email" id="email" name="email" required placeholder="your.email@example.com">
        </div>
        
        <div class="form-group">
            <label for="idea-title">Project Title / Theme:</label>
            <input type="text" id="idea-title" name="idea_title" required placeholder="e.g., Multiplayer Game, Calculator...">
        </div>
        
        <div class="form-group">
            <label for="message">Describe Your Idea:</label>
            <textarea id="message" name="idea_description" rows="5" required placeholder="Explain what features or tools this project should have..."></textarea>
        </div>
        
        <button type="submit" id="submitBtn">Submit Idea</button>
    </form>
    
    <!-- 2. Status message container area -->
    <div id="formStatus" style="display:none; text-align:center; font-weight:bold; margin-top:15px; color:#470000;"></div>
</div>

<!-- 3. AJAX PROTECTION SCRIPT LINK -->
<script>
  const form = document.getElementById("ideaForm");
  const status = document.getElementById("formStatus");
  const btn = document.getElementById("submitBtn");

  form.addEventListener("submit", async function(event) {
    event.preventDefault(); // Blocks the broken default browser link redirection
    
    btn.disabled = true;
    btn.textContent = "Sending...";
    status.style.display = "block";
    status.textContent = "Uploading your idea securely...";

    const data = new FormData(event.target);

    // Forces a secure background POST request to bypass iframe method restrictions
    fetch(event.target.action, {
      method: form.method, // Explicitly locks in POST format execution
      body: data,
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        status.style.color = "#22C55E"; // Success text color changes to bright green
        status.textContent = "💡 Idea submitted successfully! Thank you, Nicky.";
        form.reset(); // Completely clears out all the textboxes on your screen
        btn.textContent = "Submit Another Idea";
        btn.disabled = false;
      } else {
        response.json().then(data => {
          status.style.color = "#EF4444";
          status.textContent = "Oops! There was a problem submitting your form.";
          btn.textContent = "Try Again";
          btn.disabled = false;
        });
      }
    }).catch(error => {
      status.style.color = "#EF4444";
      status.textContent = "Network error. Please check your internet connection.";
      btn.textContent = "Try Again";
      btn.disabled = false;
    });
  });
</script>
