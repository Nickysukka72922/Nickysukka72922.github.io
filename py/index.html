<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Python Editor</title>
    
    <!-- Local Files for Design Styling and Python Engine -->
    <script src="tailwind.js"></script>
    <script src="pyodide.js"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">

    <!-- Navbar Layout -->
    <header class="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700">
        <h1 class="text-xl font-bold text-green-400">			Browser Python IDE</h1>
        <button id="run-btn" class="bg-green-500 hover:bg-green-600 text-gray-900 font-bold px-6 py-2 rounded transition opacity-50 cursor-not-allowed" disabled>
            Loading Python Engine...
        </button>
    </header>

    <!-- Main Workspace Frame -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- 1. UNBLOCKABLE TEXT EDITOR PANEL -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full flex flex-col bg-gray-950 p-2">
            <div class="flex justify-between items-center px-2 py-1 text-xs text-gray-500 uppercase tracking-wider font-semibold">
                <span>python_script.py</span>
                <span class="text-green-500 text-xxs">● Native Mode Enabled</span>
            </div>
            <!-- Standard HTML Textarea styled exactly like a modern dark-theme code box -->
            <textarea id="code-editor" class="flex-1 w-full bg-gray-950 text-green-300 p-4 font-mono text-sm border border-gray-800 rounded focus:outline-none focus:border-green-600 resize-none leading-relaxed" spellcheck="false">def greet(name):
    return f"Hello, {name}!"

print(greet("GitHub User"))
print("Calculations complete.")</textarea>
        </div>
        
        <!-- 2. INTERACTIVE OUTPUT TERMINAL CONSOLE -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full bg-black p-4 flex flex-col border-t md:border-t-0 md:border-l border-gray-700">
            <h2 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Console Output</h2>
            <pre id="output" class="flex-1 font-mono text-sm text-gray-300 overflow-y-auto whitespace-pre-wrap">Initializing workspace layers...</pre>
        </div>
    </main>

    <!-- Native Local Runtime Execution Logic -->
    <script>
        let pyodideInstance;
        const codeTextarea = document.getElementById('code-editor');

        // Allow Tab indentation functionality inside the code panel
        codeTextarea.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });

        // Initialize Pyodide Using 100% Local Folder Assets
        async function initPyodide() {
            const outputElement = document.getElementById("output");
            const runButton = document.getElementById("run-btn");

            try {
                if (typeof loadPyodide === 'function') {
                    const currentFolderUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/')) + '/';
                    const emptyJsonDataUri = "data:application/json;base64,eyJpbmZvIjp7InZlcnNpb24iOiIwLjI2LjEifSwicGFja2FnZXMiOnt9fQ==";

                    pyodideInstance = await loadPyodide({
                        indexURL: currentFolderUrl,
                        lockFileURL: emptyJsonDataUri
                    });
                    
                    outputElement.textContent = "Python engine ready!\nType your script on the left and click 'Run Code'.";
                    runButton.disabled = false;
                    runButton.classList.remove('opacity-50', 'cursor-not-allowed');
                    runButton.textContent = "Run Code";
                } else {
                    throw new Error("The global 'loadPyodide' script hook was not parsed by the browser.");
                }
            } catch (err) {
                outputElement.textContent = `Local Runtime Load Error:\n${err.message}`;
                console.error(err);
            }
        }
        initPyodide();

        // Code Execution Stream Engine
        document.getElementById("run-btn").addEventListener("click", async () => {
            if (!pyodideInstance) return;
            
            const outputElement = document.getElementById("output");
            outputElement.textContent = "Running code sequence...\n";
            
            // Grabs code values cleanly out of the textarea
            const code = codeTextarea.value;

            try {
                pyodideInstance.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                    sys.stderr = io.StringIO()
                `);

                await pyodideInstance.runPythonAsync(code);

                const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
                const stderr = pyodideInstance.runPython("sys.stderr.getvalue()");

                outputElement.textContent = stdout + stderr;
                if (!stdout && !stderr) {
                    outputElement.textContent = "Code executed cleanly (Returned process 0).";
                }
            } catch (err) {
                outputElement.textContent = `Traceback Execution Fault:\n${err.message}`;
            }
        });
    </script>
  <style>
  .floating-back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100; /* Keeps it on top of other elements */
        }

        .floating-back-btn img {
            width: 60px;                  
            height: 60px;
            border-radius: 50%; /* Makes it a circle */          
            border: 3px solid white;      
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); 
            background-color: white; /* Makes sure the icon is visible */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;              
        }

        /* Hover effect */
        .floating-back-btn img:hover {
            transform: scale(1.1); /* Slight zoom on hover */        
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); 
        }

        /* Mobile responsive shrinking */
        @media (max-width: 480px) {
            .floating-back-btn {
                top: 10px;
                left: 10px;
            }
            .floating-back-btn img {
                width: 45px;
                height: 45px;
            }
        }
  </style>
    <a href="https://nickysukka72922.github.io/home" target="_self" class="floating-back-btn">
        <img src="https://nickysukka72922.github.io/back btn.png" alt="Back">
    </a>
</body>
</html>
