<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Python Editor</title>
    
    <!-- Local Static Script Hooks Only -->
    <script src="tailwind.js"></script>
    <script src="loader.js"></script>
    <script src="pyodide.js"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">

    <!-- Navbar -->
    <header class="bg-gray-800 p-4 flex justify-between items-center border-b border-gray-700">
        <h1 class="text-xl font-bold text-green-400">🐍 Browser Python IDE</h1>
        <button id="run-btn" class="bg-green-500 hover:bg-green-600 text-gray-900 font-bold px-6 py-2 rounded transition opacity-50 cursor-not-allowed" disabled>
            Loading Python Engine...
        </button>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- Code Editor Section -->
        <div id="editor-container" class="w-full md:w-1/2 h-1/2 md:h-full"></div>
        
        <!-- Console Terminal Section -->
        <div class="w-full md:w-1/2 h-1/2 md:h-full bg-black p-4 flex flex-col border-t md:border-t-0 md:border-l border-gray-700">
            <h2 class="text-sm font-semibold text-gray-400 mb-2 uppercase tracking-wider">Console Output</h2>
            <pre id="output" class="flex-1 font-mono text-sm text-gray-300 overflow-y-auto whitespace-pre-wrap">Initializing workspace...</pre>
        </div>
    </main>

    <!-- Unified Local Runtime Execution Logic -->
    <script>
        let editor;
        let pyodideInstance;

        // 1. Initialize Monaco Editor Safely
        if (typeof require !== 'undefined') {
            require.config({ paths: { vs: 'https://cloudflare.com' } });
            require(['vs/editor/editor.main'], function () {
                editor = monaco.editor.create(document.getElementById('editor-container'), {
                    value: `def greet(name):\n    return f"Hello, {name}!"\n\nprint(greet("GitHub User"))\n`,
                    language: 'python',
                    theme: 'vs-dark',
                    automaticLayout: true,
                    fontSize: 14
                });
            });
        }

        // 2. Initialize Pyodide Bypassing the Package Lock File
        async function initPyodide() {
            const outputElement = document.getElementById("output");
            const runButton = document.getElementById("run-btn");

            try {
                if (typeof loadPyodide === 'function') {
                    
                    const currentFolderUrl = window.location.href.substring(0, window.location.href.lastIndexOf('/')) + '/';
                    
                    pyodideInstance = await loadPyodide({
                        indexURL: currentFolderUrl,
                        // FIXED: Setting this explicitly to null skips the broken package check entirely
                        lockFileURL: null
                    });
                    
                    outputElement.textContent = "Python engine ready!\nClick 'Run Code' to execute.";
                    runButton.disabled = false;
                    runButton.classList.remove('opacity-50', 'cursor-not-allowed');
                    runButton.textContent = "Run Code";
                } else {
                    throw new Error("The global 'loadPyodide' script hook was not parsed by the browser.");
                }
            } catch (err) {
                outputElement.textContent = `Local Runtime Load Error:\n${err.message}`;
                console.error(err);
            }
        }
        initPyodide();

        // 3. Execution Processing Engine
        document.getElementById("run-btn").addEventListener("click", async () => {
            if (!editor || !pyodideInstance) return;
            
            const outputElement = document.getElementById("output");
            outputElement.textContent = "Running code sequence...\n";
            
            const code = editor.getValue();

            try {
                pyodideInstance.runPython(`
                    import sys
                    import io
                    sys.stdout = io.StringIO()
                    sys.stderr = io.StringIO()
                `);

                await pyodideInstance.runPythonAsync(code);

                const stdout = pyodideInstance.runPython("sys.stdout.getvalue()");
                const stderr = pyodideInstance.runPython("sys.stderr.getvalue()");

                outputElement.textContent = stdout + stderr;
                if (!stdout && !stderr) {
                    outputElement.textContent = "Code executed cleanly (Returned process 0).";
                }
            } catch (err) {
                outputElement.textContent = `Traceback Execution Fault:\n${err.message}`;
            }
        });
    </script>
</body>
</html>
