<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            height: 100vh;           
            text-align: center;
            gap: 10px; 
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404 (Invalid Url)</h1>
        <p>The provided url does not exist.</p>
        <button onclick="history.back()">Go Back</button>
    </div>
</body>
</html>
