<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#470000">
    <meta name="description" content="Explore Nicky's project hub. Search through custom web apps, interact with responsive design layouts, and submit your own creative game ideas!">
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="home.css">
    <title>Home | Nickysukka72922</title>
</head>
<body>
    <!-- 1. The Preloader Wrapper Screen -->
    <div id="preloader">
        <div class="loader-content">
            <!-- A cool spinning game-die / puzzle cube icon -->
            <div class="spinner"></div>
            <p>Loading Nicky's Arcade...</p>
        </div>
    </div>

    <!-- 2. Search Bar Interface -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search projects...">
        <ul id="searchResults"></ul>
    </div>

    <!-- 3. Your Project Grid (Fully Repaired Layout) -->
    <div class="project-grid">
        <a href="https://Nickysukka72922.github.io">
            <img class="img" src="https://nickysukka72922.github.io/website.png">
        </a>
        <a href="https://Nickysukka72922.github.io/to do list/">
            <img class="img" src="https://nickysukka72922.github.io/todolist800x800.png">
        </a>
        <a href="https://Nickysukka72922.github.io/scratch-gui/index.html">
            <img class="img" src="https://nickysukka72922.github.io/cat.png">
        </a>
        <a href="https://Nickysukka72922.github.io/physics">
            <img class="img" src="https://nickysukka72922.github.io/phisics.png">
        </a>
        <a href="https://Nickysukka72922.github.io/3d">
            <img class="img" src="https://nickysukka72922.github.io/3d.png">
        </a>
        <a href="https://Nickysukka72922.github.io/game">
            <img class="img" src="https://nickysukka72922.github.io/game.png">
        </a>
        <a href="https://Nickysukka72922.github.io/idea">
            <img class="img" src="https://nickysukka72922.github.io/not_found.jpg">
        </a>
        <a href="https://Nickysukka72922.github.io/py">
            <img class="img" src="https://nickysukka72922.github.io/py.*">
        </a>
    </div>

    <!-- 4. Project Search Logic -->
    <script>
        // Data index maps directly to your links and keywords
        const projects = [
            { name: "Home / Main Website", url: "https://nickysukka72922.github.io", tags: "home main landing nickysukka72922" },
            { name: "To Do List", url: "https://nickysukka72922.github.io/to do list/", tags: "todo list task planner checklist" },
            { name: "Scratch GUI", url: "https://nickysukka72922.github.io/scratch-gui/index.html", tags: "scratch gui coding blocks game programming" },
            { name: "Physics Engine", url: "https://nickysukka72922.github.io/physics", tags: "physics gravity simulation math science" },
            { name: "3D Graphics", url: "https://nickysukka72922.github.io/3d", tags: "3d threejs render modeling cubes spatial" },
            { name: "Platformer", url: "https://nickysukka72922.github.io/game", tags: "game play arcade fun interactive godot engine platform jumping" },
            { name: "Idea Submissions", url: "https://nickysukka72922.github.io/idea", tags: "idea new project game suggestion form contact" },
            { name: "Python", url: "https://nickysukka72922.github.io/py", tags: "editor py python app code coding" }
        ];

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            searchResults.innerHTML = '';

            if (query === '') {
                searchResults.style.display = 'none';
                return;
            }

            // Matches your search against the project name or hidden tags
            const matched = projects.filter(p => 
                p.name.toLowerCase().includes(query) || p.tags.toLowerCase().includes(query)
            );

            if (matched.length > 0) {
                searchResults.style.display = 'block';
                matched.forEach(p => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = p.url;
                    a.textContent = p.name;
                    li.appendChild(a);
                    searchResults.appendChild(li);
                });
            } else {
                searchResults.style.display = 'block';
                const li = document.createElement('li');
                li.textContent = "No projects found";
                li.className = "no-results";
                searchResults.appendChild(li);
            }
        });

        // Hides dropdown if you click anywhere else on the page
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.innerHTML = '';
                searchResults.style.display = 'none';
            }
        });
    </script>

    <!-- 5. Preloader Fade-In/Out and Link Transition Logic -->
    <script>
        // 1. When the page first opens, fade away the red screen
        window.addEventListener('load', function() {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('fade-out');
        });

        // 2. Look for all project links on your page
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', function(e) {
                const targetUrl = this.href;
                
                // Ignore empty links or links that open in a brand new tab
                if (!targetUrl || this.target === '_blank' || targetUrl.includes('#')) {
                    return;
                }

                // STOP the browser from changing pages instantly!
                e.preventDefault();

                // Bring your deep red loading screen back up
                const preloader = document.getElementById('preloader');
                preloader.classList.remove('fade-out');

                // FORCE the browser to wait 500 milliseconds (0.5 seconds)
                // This gives your red screen enough time to fade back in before swapping URLs!
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 500);
            });
        });
    </script>
</body>
</html>
